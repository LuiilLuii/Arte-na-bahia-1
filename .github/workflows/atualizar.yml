name: Atualizar Oportunidades

on:
  schedule:
    - cron: '0 9 * * *'   # roda todo dia às 9h UTC
  workflow_dispatch:       # permite rodar manualmente

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # necessário para dar push no JSON

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4
      - run: python scraper.py
      - name: Commit e push se houver mudanças
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add oportunidades.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Atualização automática $(date +'%d/%m/%Y')" && git push)
